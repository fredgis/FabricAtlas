id: fabricatlas
name: FabricAtlas
version: 1.0.0
services:
  auth:
    enabled: true
    fabric:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
      - https://brisk-ledge-93076fb928-centralus.webapp.fabricapps.net
      - https://curly-coral-5adca33fed-centralus.webapp.fabricapps.net
      - https://regal-pond-64fa781fd5-centralus.webapp.fabricapps.net
      - https://safe-gorge-104de50bf3-centralus.webapp.fabricapps.net
      - https://proud-cave-48236d1cc4-centralus.webapp.fabricapps.net
  data:
    enabled: true
    dialect: mssql
  storage:
    enabled: true
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build:fabric
    indexDocument: index.html
  functions:
    enabled: false
